spring:
  application:
    name: booking-system

  datasource:
    # Override via environment variables for production deployments.
    # Docker Compose sets POSTGRES_HOST / POSTGRES_PORT / POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD.
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:booking_db}
    username: ${POSTGRES_USER:booking_user}
    password: ${POSTGRES_PASSWORD:booking_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      # WARNING: use 'validate' or Flyway migrations in production.
      # 'update' is acceptable only for local development.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false   # Disable OSIV to keep transaction boundaries explicit

server:
  port: 8080

logging:
  level:
    com.example.booking: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
