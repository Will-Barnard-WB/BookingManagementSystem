spring:
  application:
    name: booking-system

  datasource:
    # Override via environment variables for production deployments.
    # Docker Compose sets POSTGRES_HOST / POSTGRES_PORT / POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD.
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:booking_db}
    username: ${POSTGRES_USER:booking_user}
    password: ${POSTGRES_PASSWORD:booking_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      # Flyway owns schema creation; Hibernate validates it matches the entities.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false   # Disable OSIV to keep transaction boundaries explicit

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [corrId=%X{correlationId:-}] [user=%X{userId:-}] [res=%X{resourceId:-}] %-5level %logger{36} - %msg%n"
  level:
    com.example.booking: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
